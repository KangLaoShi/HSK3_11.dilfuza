        // --- 实用工具函数 ---
        let preferredVoice = null;

        const initVoices = () => {
            if (!('speechSynthesis' in window)) return;
            const voices = window.speechSynthesis.getVoices();
            const zhVoices = voices.filter(v => v.lang.replace('_', '-').toLowerCase().includes('zh') || v.lang.toLowerCase().includes('cmn'));
            
            preferredVoice = zhVoices.find(v => v.name.includes('Xiaoxiao') || v.name.includes('Neural') || v.name.includes('Natural'))
                || zhVoices.find(v => v.name.includes('Online'))
                || zhVoices.find(v => v.name.includes('Google'))
                || zhVoices.find(v => v.name.includes('Ting-Ting') || v.name.includes('Yating') || v.name.includes('Lili'))
                || zhVoices[0] 
                || null;
        };

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = initVoices;
            initVoices();
        }

        const fixPolyphones = (text) => {
            let ttsText = text;
            if (ttsText === '还') return '环'; 
            ttsText = ttsText.replace(/把这本词典还了/g, '把这本词典环了'); 
            ttsText = ttsText.replace(/还书/g, '环书');
            ttsText = ttsText.replace(/还了吧/g, '环了吧');
            return ttsText;
        };

        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const ttsText = fixPolyphones(text);
                const utterance = new SpeechSynthesisUtterance(ttsText);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.85; 
                utterance.pitch = 1.0;

                if (!preferredVoice) initVoices();
                if (preferredVoice) utterance.voice = preferredVoice;

                window.speechSynthesis.speak(utterance);
            }
        };

        const shuffleArray = (array) => {
            let newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        // --- 组件 ---
        function Flashcards() {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => setCurrentIndex((prev) => (prev + 1) % VOCABULARY.length), 150);
            };

            const prevCard = () => {
                setIsFlipped(false);
                setTimeout(() => setCurrentIndex((prev) => (prev - 1 + VOCABULARY.length) % VOCABULARY.length), 150);
            };

            const word = VOCABULARY[currentIndex];

            return (
                <div className="flex flex-col items-center justify-center min-h-[60vh] py-10">
                    <div className="w-full max-w-md perspective-1000" onClick={() => setIsFlipped(!isFlipped)}>
                        <div className={`relative w-full h-80 transition-transform duration-500 transform-style-3d cursor-pointer ${isFlipped ? 'rotate-y-180' : ''}`}>
                            <div className="absolute inset-0 backface-hidden bg-white rounded-2xl shadow-xl flex flex-col items-center justify-center p-8 border border-gray-100">
                                <span className="text-8xl font-bold text-gray-800 mb-6">{word.char}</span>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); speakText(word.char); }}
                                    className="p-3 bg-indigo-100 text-indigo-700 rounded-full hover:bg-indigo-200 transition-colors shadow-sm"
                                >
                                    <Volume2 size={28} />
                                </button>
                            </div>
                            <div className="absolute inset-0 backface-hidden bg-indigo-600 rounded-2xl shadow-xl flex flex-col items-center justify-center p-8 rotate-y-180 text-center text-white">
                                <span className="text-3xl font-medium mb-4 tracking-wide">{word.pinyin}</span>
                                <div className="w-full h-px bg-indigo-400 mb-4 opacity-50"></div>
                                <span className="text-xl font-semibold text-yellow-300 mb-2">{word.uz}</span>
                                <span className="text-lg text-indigo-100 mb-2">{word.ru}</span>
                                <span className="text-lg text-indigo-200 mb-6 italic">{word.en}</span>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); speakText(word.char); }}
                                    className="p-3 bg-white/20 text-white rounded-full hover:bg-white/30 transition-colors"
                                >
                                    <Volume2 size={24} />
                                </button>
                            </div>
                        </div>
                    </div>
                    <div className="flex items-center space-x-6 mt-10">
                        <button onClick={prevCard} className="p-3 rounded-full bg-white shadow hover:bg-gray-50 border border-gray-200 text-gray-600 transition-colors">
                            <ChevronLeft size={24} />
                        </button>
                        <span className="text-gray-500 font-medium">
                            {currentIndex + 1} / {VOCABULARY.length}
                        </span>
                        <button onClick={nextCard} className="p-3 rounded-full bg-white shadow hover:bg-gray-50 border border-gray-200 text-gray-600 transition-colors">
                            <ChevronRight size={24} />
                        </button>
                    </div>
                </div>
            );
        }

        function VocabTest() {
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isAnswered, setIsAnswered] = useState(false);

            useEffect(() => {
                generateTest();
            }, []);

            const generateTest = () => {
                const shuffledVocab = shuffleArray(VOCABULARY); 
                
                const qList = shuffledVocab.map(word => {
                    let options = [word.uz];
                    while(options.length < 4) {
                        const randWord = VOCABULARY[Math.floor(Math.random() * VOCABULARY.length)].uz;
                        if (!options.includes(randWord)) {
                            options.push(randWord);
                        }
                    }
                    return { char: word.char, correct: word.uz, options: shuffleArray(options) };
                });
                
                setQuestions(qList);
                setCurrentIndex(0);
                setScore(0);
                setShowResult(false);
                setSelectedAnswer(null);
                setIsAnswered(false);
            };

            const handleSelect = (option) => {
                if (isAnswered) return;
                setSelectedAnswer(option);
                setIsAnswered(true);
                
                if (option === questions[currentIndex].correct) {
                    setScore(s => s + 1);
                }

                setTimeout(() => {
                    if (currentIndex < questions.length - 1) {
                        setCurrentIndex(c => c + 1);
                        setSelectedAnswer(null);
                        setIsAnswered(false);
                    } else {
                        setShowResult(true);
                    }
                }, 1200);
            };

            if (questions.length === 0) return <div>Yuklanmoqda...</div>;

            if (showResult) {
                return (
                    <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm border p-8 text-center animate-fade-in">
                        <h2 className="text-3xl font-bold text-gray-800 mb-4">Test natijasi</h2>
                        <div className="text-6xl mb-6 font-bold text-indigo-600">
                            {score} / {questions.length}
                        </div>
                        <p className="text-gray-600 mb-8 text-lg">
                            {score === questions.length ? "Ajoyib natija! Siz barcha so'zlarni bilasiz!" : "Yaxshi harakat qildingiz, yana bir bor urinib ko'ring!"}
                        </p>
                        <button onClick={generateTest} className="bg-indigo-600 text-white px-8 py-3 rounded-xl hover:bg-indigo-700 transition flex items-center justify-center w-full sm:w-auto mx-auto font-medium">
                            <RotateCcw size={20} className="mr-2" />
                            Testni qaytadan boshlash
                        </button>
                    </div>
                );
            }

            const currentQ = questions[currentIndex];

            return (
                <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div className="bg-indigo-50 px-6 py-4 flex justify-between items-center border-b border-indigo-100">
                        <h3 className="text-indigo-900 font-semibold">To'g'ri tarjimani tanlang</h3>
                        <span className="text-sm font-medium bg-indigo-200 text-indigo-800 px-3 py-1 rounded-full">
                            {currentIndex + 1} / {questions.length}
                        </span>
                    </div>
                    <div className="p-8 flex flex-col items-center">
                        <div className="text-7xl font-bold text-gray-800 mb-10 py-6">
                            {currentQ.char}
                        </div>
                        <div className="w-full space-y-3">
                            {currentQ.options.map((opt, idx) => {
                                let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all font-medium text-lg flex justify-between items-center ";
                                if (!isAnswered) {
                                    btnClass += "border-gray-200 hover:border-indigo-400 hover:bg-indigo-50 text-gray-700";
                                } else {
                                    if (opt === currentQ.correct) {
                                        btnClass += "border-green-500 bg-green-50 text-green-700";
                                    } else if (opt === selectedAnswer) {
                                        btnClass += "border-red-500 bg-red-50 text-red-700";
                                    } else {
                                        btnClass += "border-gray-200 bg-gray-50 text-gray-400 opacity-50";
                                    }
                                }

                                return (
                                    <button key={idx} onClick={() => handleSelect(opt)} disabled={isAnswered} className={btnClass}>
                                        <span>{opt}</span>
                                        {isAnswered && opt === currentQ.correct && <CheckCircle2 size={20} className="text-green-600" />}
                                        {isAnswered && opt === selectedAnswer && opt !== currentQ.correct && <XCircle size={20} className="text-red-600" />}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        function Dialogues() {
            return (
                <div className="space-y-8 max-w-4xl mx-auto">
                    {DIALOGUES.map((dialogue, dIdx) => (
                        <div key={dIdx} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

                                    <Volume2 size={16} className="mr-1.5" /> Barchasini tinglash

                                                        <Volume2 size={18} />

                                                <div className="text-indigo-600 text-sm mb-2">{line.pinyin}</div>
                                                <div className="text-gray-700 text-sm mb-1"><span className="font-semibold text-xs text-gray-400 mr-2 uppercase">UZ</span>{line.uz}</div>
                                                <div className="text-gray-600 text-sm mb-1"><span className="font-semibold text-xs text-gray-400 mr-2 uppercase">RU</span>{line.ru}</div>
                                                <div className="text-gray-500 text-sm italic"><span className="font-semibold text-xs text-gray-400 mr-2 uppercase not-italic">EN</span>{line.en}</div>
                                            </div>
                                        </div>
                                    </div>

        function Grammar() {
            return (
                <div className="space-y-8 max-w-4xl mx-auto">
                    {GRAMMAR_EXPLANATIONS.map((grammar, idx) => (
                        <div key={idx} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-8">

                                        <p className="text-gray-700"><span className="font-bold text-blue-800 text-xs uppercase mr-2 bg-blue-200 px-2 py-0.5 rounded">RU</span>{rule.ru}</p>
                                        <p className="text-gray-600"><span className="font-bold text-blue-800 text-xs uppercase mr-2 bg-blue-200 px-2 py-0.5 rounded">EN</span>{rule.en}</p>

                                {grammar.structure}

                                    {grammar.examples.map((ex, eIdx) => (

                                                <Volume2 size={18} />
                                            </button>
                                            <div>
                                                <div className="text-xl text-gray-900 font-medium">{ex.char}</div>
                                                <div className="text-indigo-600 text-sm my-1">{ex.pinyin}</div>
                                                <div className="text-gray-600 text-sm mt-2">{ex.desc}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}

        function GrammarTest() {
            const [answers, setAnswers] = useState({});
            const [submitted, setSubmitted] = useState(false);
            const [score, setScore] = useState(0);

            const handleOptionChange = (qIndex, oIndex) => {
                if (submitted) return;
                setAnswers(prev => ({ ...prev, [qIndex]: oIndex }));
            };

            const handleSubmit = () => {
                let currentScore = 0;
                GRAMMAR_TEST_QUESTIONS.forEach((q, idx) => {
                    if (answers[idx] === q.answer) currentScore++;
                });
                setScore(currentScore);
                setSubmitted(true);
            };

            const handleReset = () => {
                setAnswers({});
                setSubmitted(false);
                setScore(0);
            };

            return (
                <div className="max-w-3xl mx-auto">
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <div className="bg-indigo-600 px-6 py-5 text-white flex justify-between items-center">
                            <h2 className="text-xl font-bold">语法测试</h2>
                            <span className="bg-white/20 px-3 py-1 rounded-full text-sm font-medium">共15题</span>
                        </div>
                        <div className="p-6 md:p-8 space-y-8">
                            {GRAMMAR_TEST_QUESTIONS.map((q, qIndex) => (
                                <div key={qIndex} className={`pb-6 border-b border-gray-100 last:border-0 last:pb-0 ${submitted && answers[qIndex] !== q.answer ? 'bg-red-50/30 -mx-6 px-6 pt-2 rounded' : ''}`}>
                                    <h3 className="text-lg font-medium text-gray-800 mb-4 flex items-start">
                                        <span className="text-indigo-400 font-bold mr-3 w-6 text-right shrink-0">{qIndex + 1}.</span>
                                        <span>{q.q}</span>
                                    </h3>
                                    <div className="grid grid-cols-2 gap-3 pl-9">
                                        {q.options.map((opt, oIndex) => {
                                            const isSelected = answers[qIndex] === oIndex;
                                            const isCorrect = q.answer === oIndex;
                                            let btnStyle = "py-2.5 px-4 rounded-lg border-2 text-center cursor-pointer transition-colors font-medium ";
                                            if (!submitted) {
                                                btnStyle += isSelected ? "border-indigo-500 bg-indigo-50 text-indigo-700" : "border-gray-200 hover:border-indigo-300 text-gray-700";
                                            } else {
                                                if (isCorrect) btnStyle += "border-green-500 bg-green-50 text-green-700";
                                                else if (isSelected && !isCorrect) btnStyle += "border-red-500 bg-red-50 text-red-700";
                                                else btnStyle += "border-gray-100 bg-gray-50 text-gray-400 opacity-50";
                                            }
                                            return <div key={oIndex} className={btnStyle} onClick={() => handleOptionChange(qIndex, oIndex)}>{opt}</div>;
                                        })}
                                    </div>
                                    {submitted && (
                                        <div className="pl-9 mt-3 flex items-center">
                                            {answers[qIndex] === q.answer 
                                                ? <span className="text-green-600 flex items-center text-sm font-medium"><CheckCircle2 size={16} className="mr-1" /> 正确</span>
                                                : <span className="text-red-600 flex items-center text-sm font-medium"><XCircle size={16} className="mr-1" /> 错误 (正确答案: {q.options[q.answer]})</span>
                                            }
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                        <div className="bg-gray-50 p-6 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                            {submitted ? (
                                <>
                                    <div className="text-xl font-bold text-gray-800 flex items-center">
                                        你的得分：<span className={`ml-2 text-3xl ${score >= 12 ? 'text-green-600' : score >= 9 ? 'text-yellow-600' : 'text-red-600'}`}>{score} / 15</span>
                                    </div>
                                    <button onClick={handleReset} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg transition-colors font-medium flex items-center w-full sm:w-auto justify-center">
                                        <RotateCcw size={18} className="mr-2" /> 重新测试
                                    </button>
                                </>
                            ) : (
                                <button onClick={handleSubmit} disabled={Object.keys(answers).length < 15} className={`w-full py-3 rounded-lg text-white font-bold text-lg transition-colors ${Object.keys(answers).length === 15 ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-gray-400 cursor-not-allowed'}`}>
                                    提交测试 {Object.keys(answers).length < 15 ? `(已答 ${Object.keys(answers).length}/15)` : ''}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

            const handleSelect = (qIndex, option) => {

                let currentScore = 0;
                FILL_BLANK_QUESTIONS.forEach((q, idx) => {
                    if (answers[idx] === q.answer) currentScore++;

                setScore(currentScore);
                setSubmitted(true);

                setAnswers({});
                setSubmitted(false);
                setScore(0);

                <div className="max-w-4xl mx-auto">

                                                    else if (isSelected && opt !== q.answer) btnClass += "bg-red-100 text-red-800 border-red-400";
                                                    else btnClass += "bg-gray-100 text-gray-400 border-gray-200 opacity-50 cursor-not-allowed";
                                                }
                                                return <button key={oIndex} onClick={() => handleSelect(qIndex, opt)} disabled={submitted} className={btnClass}>{opt}</button>;
                                            })}
                                        </div>
                                        {submitted && (
                                            <div className="pl-9 mt-3">
                                                {isCorrect 
                                                    ? <span className="text-green-600 flex items-center text-sm font-medium"><Check size={16} className="mr-1"/> 正确</span>
                                                    : <span className="text-red-600 flex items-center text-sm font-medium"><XCircle size={16} className="mr-1"/> 错误 (正确: {q.answer})</span>
                                                }
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        <div className="bg-gray-50 p-6 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                            {submitted ? (
                                <>
                                    <div className="text-xl font-bold text-gray-800">
                                        得分：<span className="text-indigo-600">{score} / 10</span>
                                    </div>
                                    <button onClick={handleReset} className="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-2.5 rounded-lg transition-colors font-medium flex items-center">
                                        <RotateCcw size={18} className="mr-2" /> 重新练习
                                    </button>
                                </>
                            ) : (
                                <button onClick={handleSubmit} disabled={Object.keys(answers).length < 10} className={`w-full sm:w-auto px-8 py-3 rounded-lg text-white font-bold transition-colors ${Object.keys(answers).length === 10 ? 'bg-yellow-500 hover:bg-yellow-600' : 'bg-gray-300 cursor-not-allowed'}`}>
                                    提交答案
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('flashcards');

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col font-sans">
                    <header className="bg-gradient-to-r from-blue-700 to-indigo-800 text-white shadow-lg p-6">
                        <div className="max-w-5xl mx-auto">
                            <h1 className="text-3xl font-bold mb-2">别忘了把空调关了</h1>
                            <h2 className="text-lg font-light text-blue-100 flex items-center">
                                <span className="bg-yellow-400 text-indigo-900 px-2 py-1 rounded text-sm font-semibold mr-3">HSK 3 - Lesson 11</span>
                                Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                            </h2>
                        </div>
                    </header>
                    <div className="bg-white border-b shadow-sm sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto flex overflow-x-auto hide-scrollbar">
                            {[
                                { id: 'flashcards', icon: <BookOpen size={18} />, label: '生词闪卡' },
                                { id: 'vocabTest', icon: <Type size={18} />, label: '生词测试' },
                                { id: 'dialogues', icon: <Volume2 size={18} />, label: '对话内容' },
                                { id: 'grammar', icon: <PenTool size={18} />, label: '语法解释' },
                                { id: 'grammarTest', icon: <CheckCircle2 size={18} />, label: '语法测试' },
                                { id: 'fillBlanks', icon: <PenTool size={18} />, label: '词语填空' }
                            ].map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center space-x-2 px-6 py-4 whitespace-nowrap border-b-2 transition-colors duration-200 ${
                                        activeTab === tab.id 
                                            ? 'border-indigo-600 text-indigo-600 font-bold bg-indigo-50/50' 
                                            : 'border-transparent text-gray-600 hover:text-indigo-500 hover:bg-gray-50'
                                    }`}
                                >
                                    {tab.icon}
                                    <span>{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                    <main className="flex-grow max-w-5xl w-full mx-auto p-4 sm:p-6 md:p-8">
                        {activeTab === 'flashcards' && <Flashcards />}
                        {activeTab === 'vocabTest' && <VocabTest />}
                        {activeTab === 'dialogues' && <Dialogues />}
                        {activeTab === 'grammar' && <Grammar />}
                        {activeTab === 'grammarTest' && <GrammarTest />}
                        {activeTab === 'fillBlanks' && <FillBlanks />}
                    </main>
                    <footer className="bg-gray-800 text-gray-300 py-8 text-center mt-auto">
                        <p className="font-medium">HSK 3 Standard Course - Lesson 11</p>
                        <p className="text-sm mt-2">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
                    </footer>
                </div>
            );
        }

        // --- 渲染到 DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
